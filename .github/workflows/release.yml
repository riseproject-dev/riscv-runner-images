name: Build and Release Github Actions Image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-runner-ubuntu-24_04:
    runs-on: ubuntu-24.04-riscv
    env:
      RUNNER_VERSION: 2.331.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build ubuntu-24.04 runner image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: runner
          file: runner/Dockerfile.ubuntu
          platforms: linux/riscv64
          tags: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s/riscv-runner:ubuntu-24.04-${{ env.RUNNER_VERSION }}${{ github.ref == 'refs/heads/main' && '' || format('-{0}', github.ref_name) }}
          build-args: |
            UBUNTU_VERSION=24.04
            RUNNER_VERSION=${{ env.RUNNER_VERSION }}
          cache-from: type=gha,scope=runner-ubuntu-24.04
          cache-to: type=gha,mode=max,scope=runner-ubuntu-24.04
          push: true

  build-runner-ubuntu-26_04:
    # runs-on: ubuntu-24.04-riscv-rva23 # Ubuntu 26.04 requires RVA23 hardware to run
    runs-on: ubuntu-latest
    env:
      RUNNER_VERSION: 2.331.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build ubuntu-26.04 runner image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: runner
          file: runner/Dockerfile.ubuntu
          platforms: linux/riscv64
          tags: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s/riscv-runner:ubuntu-26.04-${{ env.RUNNER_VERSION }}${{ github.ref == 'refs/heads/main' && '' || format('-{0}', github.ref_name) }}
          build-args: |
            UBUNTU_VERSION=26.04
            RUNNER_VERSION=${{ env.RUNNER_VERSION }}
          cache-from: type=gha,scope=runner-ubuntu-26.04
          cache-to: type=gha,mode=max,scope=runner-ubuntu-26.04
          push: true

  build-dind:
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build dind image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          platforms: linux/riscv64
          context: dind
          tags: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s/riscv-runner:dind${{ github.ref == 'refs/heads/main' && '' || format('-{0}', github.ref_name) }}
          cache-from: type=gha,scope=dind
          cache-to: type=gha,mode=max,scope=dind
          push: true

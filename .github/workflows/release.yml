name: Build and Release Github Actions Image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

env:
  RUNNER_VERSION: 2.331.0

jobs:
  build-runner:
    strategy:
      matrix:
        include:
        - os: ubuntu
          os-version: 24.04
          runs-on: ubuntu-24.04-riscv
        - os: ubuntu
          os-version: 26.04
          runs-on: ubuntu-latest # ubuntu-26.04-riscv-rva23 # Ubuntu 26.04 requires RVA23 hardware to run
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup QEMU
        if: matrix.runs-on == 'ubuntu-latest'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Login to Scaleway Container Registry
        if: github.repository_owner == 'riseproject-dev'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build ${{ matrix.os }}-${{ matrix.os-version }} runner image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: runner
          file: runner/Dockerfile.${{ matrix.os }}
          platforms: linux/riscv64
          tags: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s/riscv-runner:${{ matrix.os }}-${{ matrix.os-version }}-${{ env.RUNNER_VERSION }}${{ github.ref != 'refs/heads/main' && format('-{0}', github.run_number) || '' }}
          build-args: |
            OS_VERSION=${{ matrix.os-version }}
            RUNNER_VERSION=${{ env.RUNNER_VERSION }}
          cache-from: type=gha,scope=runner-${{ matrix.os }}-${{ matrix.os-version }}
          cache-to: type=gha,mode=max,scope=runner-${{ matrix.os }}-${{ matrix.os-version }}
          push: ${{ github.repository_owner == 'riseproject-dev' }}

  build-dind:
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Login to Scaleway Container Registry
        if: github.repository_owner == 'riseproject-dev'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build dind image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          platforms: linux/riscv64
          context: dind
          tags: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s/riscv-runner:dind${{ github.ref != 'refs/heads/main' && format('-{0}', github.run_number) || '' }}
          cache-from: type=gha,scope=dind
          cache-to: type=gha,mode=max,scope=dind
          push: ${{ github.repository_owner == 'riseproject-dev' }}

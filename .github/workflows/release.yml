name: Build and Release Github Actions Image

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-runner:
    runs-on: ubuntu-latest
    env:
      RUNNER_VERSION: 2.331.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Scaleway Container Registry
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s -u nologin --password-stdin

      - name: Build ubuntu-24.04 runner image
        run: |
          docker buildx build \
            --platform linux/riscv64 \
            --file runner/Dockerfile.ubuntu \
            --build-arg UBUNTU_VERSION=24.04 \
            --build-arg RUNNER_VERSION=${RUNNER_VERSION} \
            --tag rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s/riscv-runner:ubuntu-24.04-${RUNNER_VERSION} \
            --cache-from type=gha,scope=runner \
            --cache-to type=gha,mode=max,scope=runner \
            --push \
            runner

      - name: Build dind image
        run: |
          docker buildx build \
            --platform linux/riscv64 \
            --file dind/Dockerfile \
            --tag rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s/riscv-runner:ubuntu-24.04-${RUNNER_VERSION}-dind \
            --cache-from type=gha,scope=dind \
            --cache-to type=gha,mode=max,scope=dind \
            --push \
            dind
